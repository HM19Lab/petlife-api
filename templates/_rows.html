{#
  在庫テーブルの行（部分テンプレート）
  ============================================
  <tbody> の中身だけを出力する。
  初期描画でも HTMX 検索結果でも、同じこのファイルを使い回す。

  1行ぶんの <tr> は _row.html に切り出した（インライン編集 PUT のレスポンスでも
  同じテンプレートを使い回すため）。
#}

{% if stocks %}
    {% for s in stocks %}
        {% include "_row.html" %}
    {% endfor %}
{% else %}
    <tr>
        <td colspan="8" class="empty">該当する在庫はありません</td>
    </tr>
{% endif %}
